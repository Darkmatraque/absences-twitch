<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Connexion Twitch...</title>
</head>
<body style="background:#0e0e10; color:white; font-family:Arial;">

<script>
  async function run() {
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");

    if (!code) {
      document.body.innerHTML = "<h1>Erreur : aucun code reçu</h1>";
      return;
    }

    // Échange du code contre un token
    const clientId = "94vekdtjnv5lo5evhn211y3ezhn0gv";
    const clientSecret = "TON_SECRET_ICI"; // à remplacer
    const redirectUri = "https://darkmatraque.github.io/absences-twitch/callback";

    const response = await fetch("https://id.twitch.tv/oauth2/token", {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: new URLSearchParams({
        client_id: clientId,
        client_secret: clientSecret,
        code: code,
        grant_type: "authorization_code",
        redirect_uri: redirectUri
      })
    });

    const data = await response.json();

    if (!data.access_token) {
      document.body.innerHTML = "<h1>Erreur lors de la connexion Twitch</h1>";
      return;
    }

    // Récupération du profil utilisateur
    const userRes = await fetch("https://api.twitch.tv/helix/users", {
      headers: {
        "Authorization": `Bearer ${data.access_token}`,
        "Client-Id": clientId
      }
    });

    const userData = await userRes.json();
    const user = userData.data[0];

    // Sauvegarde dans localStorage
    localStorage.setItem("twitchUser", JSON.stringify(user));

    // Redirection vers le calendrier
    window.location.href = "calendar.html";
  }

  run();
</script>

</body>
</html>
