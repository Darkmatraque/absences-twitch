    <img id="avatar" src="" width="50" style="border-radius:50%; display:none;">

  <h1>Calendrier des absences</h1>

  <!-- Conteneur du calendrier -->
  <div class="calendar-container" id="calendar"></div>

  <!-- Chargement du user -->
  <script>
    const user = JSON.parse(localStorage.getItem("twitchUser"));

    if (!user) {
      window.location.href = "index.html";
    }

    document.getElementById("username").textContent = user.display_name || user.login;

    const avatar = document.getElementById("avatar");
    avatar.src = user.profile_image_url;
    avatar.style.display = "block";
  </script>
