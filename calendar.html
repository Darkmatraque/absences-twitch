<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Calendrier des absences</title>

  <!-- CSS -->
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <!-- User connecté -->
  <div id="user-info">
    <img id="avatar" src="" style="display:none;">
    <span id="username"></span>
  </div>

  <h1>Calendrier des absences</h1>

  <!-- CONTENEUR GLOBAL -->
  <div class="calendar-container">

    <!-- NAVIGATION DE DATE -->
    <div id="date-nav">
      <button id="prev-day">◀</button>
      <span id="current-date"></span>
      <button id="next-day">▶</button>
    </div>

    <!-- CALENDRIER -->
    <div id="calendar"></div>

  </div>

  <!-- Chargement du user -->
  <script>
    const user = JSON.parse(localStorage.getItem("twitchUser"));

    if (!user) {
      window.location.href = "index.html";
    }

    document.getElementById("username").textContent = user.display_name || user.login;

    const avatar = document.getElementById("avatar");
    avatar.src = user.profile_image_url;
    avatar.style.display = "block";
  </script>
