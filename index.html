<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Connexion Twitch</title>
  <style>
    body {
      background: #0e0e10;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
    }
    button {
      background: #9146FF;
      color: white;
      border: none;
      padding: 15px 25px;
      font-size: 18px;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover {
      background: #772ce8;
    }
  </style>
</head>
<body>

  <h1>Connexion avec Twitch</h1>

  <button onclick="login()">Se connecter</button>

  <script>
    function login() {
      const clientId = "TON_CLIENT_ID_TWITCH";
      const redirectUri = "https://darkmatraque.github.io/absences-twitch/callback";
      const scope = "user:read:email";

      const url =
        `https://id.twitch.tv/oauth2/authorize?client_id=${clientId}` +
        `&redirect_uri=${encodeURIComponent(redirectUri)}` +
        `&response_type=code&scope=${encodeURIComponent(scope)}`;

      window.location.href = url;
    }
  </script>

</body>
</html>
